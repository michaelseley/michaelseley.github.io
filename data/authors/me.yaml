bio: |
  Michael Seley is the Policy Director for Fresno City Council President Nelson Esparza and 
  Principal at Melogold Strategic Group, a public affairs and policy result consulting firm. His
  work advances strategies to support minority-owned small businesses and local entrepreneurship.
  Prior to joining the City of Fresno, he led entrepreneurship ecosystem research at the UC Riverside
  School of Public Policy and contributed to regional initatives inclusing Inland Empire 2030 and the
  IE-GO Coordinating Council. Michael is passionate about advancing inclusive economic development
  in California's inland regions.


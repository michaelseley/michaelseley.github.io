bio: |
  Michael Seley is the Policy Director for Fresno City Council President Nelson Esparza and 
  Principal at Melogold Strategic Group, a public affairs and policy research consulting firm. His 
  research examines regional approaches to economic and community development. Prior to joining the 
  City of Fresno, he led entrepreneurship ecosystem research at the UC Riverside School of Public 
  Policy where contributed to regional initatives including Inland Empire 2030 and the IE-GO 
  Coordinating Council. Michael is passionate about advancing equitable economic development in 
  California's inland regions by identifying and leveraging shared interests to attract industries
  that create high-quality jobs.

